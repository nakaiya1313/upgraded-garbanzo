<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>きめる！ ｜ なんでも決めるアプリ</title>
<style>
  :root{ --bg:#FBF4E6; --surface:#FFFFFF; --ink:#241E18; --muted:#7A6F63; --line:#E7DDC9;
    --primary:#E0492F; --primary-d:#B83A24; --teal:#2C7A6B; --gold:#E8A93A; --radius:18px; }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ background:var(--bg); color:var(--ink); min-height:100dvh;
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif;
    -webkit-text-size-adjust:100%; }
  .wrap{ max-width:560px; margin:0 auto; padding:10px 14px 24px; }
  header{ display:flex; align-items:center; gap:8px; padding:6px 2px 4px; }
  .brand{ font-size:1.45rem; font-weight:800; color:var(--primary); letter-spacing:.02em; }
  .brand .em{ color:var(--gold); }
  .tagline{ font-size:.72rem; color:var(--muted); }
  .mute{ margin-left:auto; border:1px solid var(--line); background:var(--surface); width:44px; height:44px;
    border-radius:12px; font-size:1.2rem; cursor:pointer; }

  .tabs{ display:flex; gap:8px; overflow-x:auto; padding:8px 0 10px; -webkit-overflow-scrolling:touch; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ flex:0 0 auto; border:2px solid var(--line); background:var(--surface); color:var(--muted);
    border-radius:999px; height:46px; padding:0 16px; font-size:.98rem; font-weight:800; cursor:pointer; }
  .tab[aria-selected="true"]{ background:var(--primary); border-color:var(--primary); color:#fff; }

  .panel{ display:none; } .panel.active{ display:block; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px;
    box-shadow:0 2px 0 #efe6d2, 0 8px 20px rgba(0,0,0,.05); }
  .card + .card{ margin-top:12px; }
  .card h3{ margin:0 0 10px; font-size:1rem; color:var(--ink); display:flex; align-items:center; gap:6px; }
  label.fld{ display:block; font-size:.85rem; font-weight:800; color:var(--muted); margin:0 0 6px; }
  textarea, input[type=text], select{ width:100%; border:1px solid var(--line); border-radius:12px; padding:12px;
    font-size:1.05rem; font-family:inherit; color:var(--ink); background:#fff; resize:vertical; }
  textarea:focus, input:focus, select:focus{ outline:3px solid #f6e6c9; border-color:var(--gold); }
  .hint{ font-size:.78rem; color:var(--muted); margin:6px 2px 0; }

  .btn{ border:none; border-radius:14px; cursor:pointer; font-weight:800; font-size:1.1rem; height:56px;
    display:inline-flex; align-items:center; justify-content:center; gap:8px; }
  .btn:active{ transform:translateY(2px); }
  .btn-primary{ background:var(--primary); color:#fff; box-shadow:0 4px 0 var(--primary-d); width:100%; }
  .btn-primary:active{ box-shadow:0 2px 0 var(--primary-d); }
  .btn-ghost{ background:#fff; color:var(--ink); border:1px solid var(--line); height:44px; font-size:.95rem;
    padding:0 14px; cursor:pointer; border-radius:12px; font-weight:700; }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .num{ width:78px; text-align:center; } .selnarrow{ width:auto; min-width:104px; }
  .small{ font-size:.85rem; color:var(--muted); }

  .result{ text-align:center; font-weight:800; margin-top:14px; min-height:1.2em; }
  .result .label{ font-size:.85rem; color:var(--muted); font-weight:700; }
  .result .big{ font-size:2.2rem; color:var(--primary); word-break:break-word; line-height:1.2;
    animation:pop .45s cubic-bezier(.2,.85,.25,1); }
  @keyframes pop{ 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.14)} 100%{transform:scale(1)} }

  .wheel-wrap{ position:relative; width:min(86vw,420px); margin:6px auto 2px; aspect-ratio:1;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.15)); }
  .wheel{ width:100%; height:100%; transition:transform 4.2s cubic-bezier(.17,.67,.16,.99); }
  .pointer{ position:absolute; top:-2px; left:50%; transform:translateX(-50%); width:0;height:0;
    border-left:16px solid transparent;border-right:16px solid transparent;border-top:28px solid var(--primary);
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3)); z-index:2; }
  .hub{ position:absolute; top:50%; left:50%; width:46px; height:46px; transform:translate(-50%,-50%);
    background:#fff; border:4px solid var(--primary); border-radius:50%; z-index:2;
    box-shadow:0 2px 5px rgba(0,0,0,.2); }

  .amida-svg{ width:100%; height:auto; display:block; }
  .amida-tops{ display:flex; justify-content:space-around; margin-bottom:2px; }
  .amida-tops button{ border:1px solid var(--line); background:#fff; border-radius:10px; padding:6px 4px;
    font-weight:800; font-size:.95rem; cursor:pointer; flex:1; margin:0 2px; max-width:90px; }
  .amida-tops button:active{ background:var(--gold); color:#fff; }

  .groups{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-top:14px; }
  .group{ border:2px solid var(--teal); border-radius:14px; padding:10px 12px; background:#f3faf8; }
  .group h4{ margin:0 0 6px; color:var(--teal); font-size:.95rem; }
  .group ul{ margin:0; padding-left:18px; } .group li{ font-weight:700; padding:2px 0; }

  .dice-area{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:18px 0 6px; min-height:66px; }
  .die{ width:66px; height:66px; background:#fff; border:2px solid var(--ink); border-radius:14px;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); padding:8px;
    box-shadow:0 3px 5px rgba(0,0,0,.12); }
  .die.num{ display:flex; align-items:center; justify-content:center; font-size:1.7rem; font-weight:800; }
  .pip{ width:12px; height:12px; background:var(--ink); border-radius:50%; align-self:center; justify-self:center; }
  .die.rolling{ animation:shake .35s linear infinite; }
  @keyframes shake{ 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-4px) rotate(-7deg)} 75%{transform:translateY(4px) rotate(7deg)} }

  .coin-area{ display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:16px 0 6px; perspective:700px; min-height:88px; }
  .coin{ width:88px; height:88px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; font-weight:800; color:#fff; transform-style:preserve-3d; text-align:center; padding:6px;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.5), 0 3px 6px rgba(0,0,0,.2); }
  .coin-img{ width:88px; height:88px; border-radius:50%; overflow:hidden; background:#fff;
    box-shadow:0 3px 7px rgba(0,0,0,.22), inset 0 0 0 2px rgba(255,255,255,.35); }
  .coin-img img{ width:100%; height:100%; object-fit:cover; display:block; }
  .coin.flip, .coin-img.flip{ animation:flip 1s ease-out; }
  @keyframes flip{ 0%{transform:rotateY(0)} 100%{transform:rotateY(1800deg)} }

  .adwrap{ margin-top:16px; }
  .ad-label{ font-size:.7rem; color:var(--muted); text-align:center; margin-bottom:2px; }
  .adbox{ width:300px; max-width:100%; min-height:250px; margin:0 auto; display:flex; align-items:center; justify-content:center;
    border-radius:12px; color:var(--muted); font-size:.85rem; text-align:center; padding:0; overflow:hidden; }
  @media (prefers-reduced-motion:reduce){ .wheel{ transition-duration:1.2s; } .coin.flip,.coin-img.flip{ animation-duration:.4s; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">🎯 きめ<span class="em">る</span>！</div>
    <div class="tagline">なんでも<br>決めるアプリ</div>
    <button class="mute" id="mute" aria-label="音のオンオフ">🔊</button>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" data-tab="roulette" aria-selected="true">🎡 ルーレット</button>
    <button class="tab" data-tab="amida" aria-selected="false">🪜 あみだ</button>
    <button class="tab" data-tab="group" aria-selected="false">👥 グループ</button>
    <button class="tab" data-tab="dice" aria-selected="false">🎲 サイコロ</button>
    <button class="tab" data-tab="coin" aria-selected="false">🪙 コイン</button>
    <button class="tab" data-tab="kuji" aria-selected="false">🎟️ くじ引き</button>
    <button class="tab" data-tab="number" aria-selected="false">🔢 数字</button>
  </div>

  <section class="panel active" id="roulette"><div class="card">
    <label class="fld" for="rl-items">候補（1行に1つ）</label>
    <textarea id="rl-items" rows="5"></textarea>
    <div class="hint">最大 12個 まで</div>
    <div class="wheel-wrap"><div class="pointer"></div><svg class="wheel" id="rl-wheel" viewBox="0 0 200 200"></svg><div class="hub"></div></div>
    <button class="btn btn-primary" id="rl-spin">まわす！</button>
    <div class="result" id="rl-result"></div>
    <div class="row" style="justify-content:center;margin-top:10px"><button class="btn-ghost" id="rl-reset">↺ 最初に戻す</button></div>
  </div></section>

  <section class="panel" id="amida"><div class="card">
    <div class="row">
      <div style="flex:1"><label class="fld" for="am-top">参加者（1行に1人）</label><textarea id="am-top" rows="4"></textarea></div>
      <div style="flex:1"><label class="fld" for="am-bottom">結果（1行に1つ）</label><textarea id="am-bottom" rows="4"></textarea></div>
    </div>
    <div class="hint">最大 10人 まで（参加者と結果は同じ数に）</div>
    <div class="row" style="margin-top:8px"><button class="btn btn-primary" id="am-make" style="flex:1">あみだを作る</button></div>
    <div id="am-stage" style="margin-top:12px; display:none">
      <div class="amida-tops" id="am-tops"></div>
      <svg class="amida-svg" id="am-svg" viewBox="0 0 320 280" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="row" style="justify-content:center; gap:10px; margin-top:6px">
        <button class="btn-ghost" id="am-all">全員の結果を見る</button>
        <button class="btn-ghost" id="am-reset">作り直す</button>
      </div>
      <div class="result" id="am-result"></div>
    </div>
    <div class="small" style="margin-top:8px">上の名前をタップすると、その人の道すじと結果が見られます。</div>
    <div class="row" style="justify-content:center;margin-top:8px"><button class="btn-ghost" id="am-default">↺ 最初に戻す</button></div>
  </div></section>

  <section class="panel" id="group"><div class="card">
    <label class="fld" for="gp-names">メンバー（1行に1人）</label>
    <textarea id="gp-names" rows="6"></textarea>
    <div class="hint">最大 50人 まで</div>
    <div class="row" style="margin:10px 0">
      <span class="small">分け方</span>
      <select id="gp-mode" class="selnarrow"><option value="groups">グループ数で分ける</option><option value="size">1組の人数で分ける</option></select>
      <input type="text" inputmode="numeric" class="num" id="gp-num" value="2">
    </div>
    <button class="btn btn-primary" id="gp-make">分ける！</button>
    <div class="row" style="justify-content:center;margin-top:8px"><button class="btn-ghost" id="gp-reset">↺ 最初に戻す</button></div>
    <div class="groups" id="gp-out"></div>
  </div></section>

  <section class="panel" id="dice"><div class="card">
    <div class="row" style="justify-content:center">
      <span class="small">数</span><input type="text" inputmode="numeric" class="num" id="dc-count" value="1"><span class="small">個</span>
      <span class="small" style="margin-left:6px">種類</span>
      <select id="dc-faces" class="selnarrow"><option value="6">6面（ふつう）</option><option value="4">4面</option><option value="8">8面</option><option value="10">10面</option><option value="12">12面</option><option value="20">20面</option></select>
    </div>
    <div class="hint" style="text-align:center">最大 10個 まで／4・6・8・10・12・20面に対応</div>
    <div class="dice-area" id="dc-area"></div>
    <button class="btn btn-primary" id="dc-roll">ふる！</button>
    <div class="result" id="dc-result"></div>
    <div class="row" style="justify-content:center;margin-top:10px"><button class="btn-ghost" id="dc-reset">↺ 最初に戻す</button></div>
  </div></section>

  <section class="panel" id="coin">
    <div class="card">
      <h3>🪙 画像コイン</h3>
      <div class="row" style="justify-content:center">
        <span class="small">枚数</span><input type="text" inputmode="numeric" class="num" id="cni-count" value="1"><span class="small">枚</span>
      </div>
      <div class="hint" style="text-align:center">最大 10枚 まで／投げると表（前）か裏（うしろ）が出ます</div>
      <div class="coin-area" id="cni-area"></div>
      <button class="btn btn-primary" id="cni-flip">画像コインを投げる！</button>
      <div class="result" id="cni-result"></div>
      <div class="row" style="justify-content:center;margin-top:10px"><button class="btn-ghost" id="cni-reset">↺ 最初に戻す</button></div>
    </div>
    <div class="card">
      <h3>✏️ 文字コイン（自由に決める）</h3>
      <div class="row">
        <div style="flex:1"><label class="fld" for="cn-head">表の言葉</label><input type="text" id="cn-head"></div>
        <div style="flex:1"><label class="fld" for="cn-tail">裏の言葉</label><input type="text" id="cn-tail"></div>
      </div>
      <div class="row" style="justify-content:center; margin-top:10px">
        <span class="small">枚数</span><input type="text" inputmode="numeric" class="num" id="cn-count" value="1"><span class="small">枚</span>
      </div>
      <div class="hint" style="text-align:center">最大 10枚 まで</div>
      <div class="coin-area" id="cn-area"></div>
      <button class="btn btn-primary" id="cn-flip">文字コインを投げる！</button>
      <div class="result" id="cn-result"></div>
      <div class="row" style="justify-content:center;margin-top:10px"><button class="btn-ghost" id="cn-reset">↺ 最初に戻す</button></div>
    </div>
  </section>

  <section class="panel" id="kuji"><div class="card">
    <div class="row" style="justify-content:center">
      <span class="small">本数</span><input type="text" inputmode="numeric" class="num" id="kj-total" value="5">
      <span class="small">あたり</span><input type="text" inputmode="numeric" class="num" id="kj-hit" value="1"><span class="small">本</span>
    </div>
    <div class="hint" style="text-align:center">最大 100本 まで</div>
    <button class="btn btn-primary" id="kj-draw">1本引く！</button>
    <div class="result" id="kj-result"></div>
    <div class="small" id="kj-status" style="text-align:center;margin-top:8px"></div>
    <div class="row" style="justify-content:center;margin-top:8px"><button class="btn-ghost" id="kj-reset">引き直す（リセット）</button></div>
  </div></section>

  <section class="panel" id="number"><div class="card">
    <div class="row" style="justify-content:center">
      <span class="small">範囲</span><input type="text" inputmode="numeric" class="num" id="nm-min" value="1"><span>〜</span><input type="text" inputmode="numeric" class="num" id="nm-max" value="100">
    </div>
    <div class="row" style="justify-content:center;margin-top:10px">
      <span class="small">個数</span><input type="text" inputmode="numeric" class="num" id="nm-count" value="1">
      <label class="small" style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="nm-uniq" checked> 重複なし</label>
    </div>
    <div class="hint" style="text-align:center">最大 50個 まで選べます</div>
    <button class="btn btn-primary" id="nm-go" style="margin-top:10px">抽選！</button>
    <div class="result" id="nm-result"></div>
    <div class="row" style="justify-content:center;margin-top:10px"><button class="btn-ghost" id="nm-reset">↺ 最初に戻す</button></div>
  </div></section>

  <div class="adwrap"><div class="ad-label">広告</div>
    <div class="adbox" id="adbox">
      <!-- admax -->
      <script src="https://adm.shinobi.jp/s/af55210a87af899a9d3aa6c00ef7b224"></script>
      <!-- admax -->
    </div>
  </div>
</div>

  /* ---- audio ---- */
  var AC=null, muted=(ls_get('kimeru_mute','0')==='1');
  function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended'){ AC.resume(); } return AC; }
  function tone(freq,dur,type,vol,when){ var a=ac(); if(!a||muted) return; var t=when||a.currentTime;
    var o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.value=freq;
    g.gain.setValueAtTime(Math.max(.0001,vol||.05),t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur); }
  function noise(dur,vol,when){ var a=ac(); if(!a||muted) return; var t=when||a.currentTime; var len=Math.floor(a.sampleRate*dur);
    var buf=a.createBuffer(1,len,a.sampleRate); var d=buf.getChannelData(0); for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var s=a.createBufferSource(); s.buffer=buf; var g=a.createGain(); g.gain.setValueAtTime(vol||.08,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    s.connect(g); g.connect(a.destination); s.start(t); s.stop(t+dur); }
  var rlTick=null;
  function stopSpinSound(){ if(rlTick){ clearTimeout(rlTick); rlTick=null; } }
  function spinSound(dur){ if(muted){ return; } stopSpinSound(); var t=0,gap=45; (function tick(){ tone(1400,.018,'square',.045); gap*=1.07; t+=gap; if(t<dur*1000){ rlTick=setTimeout(tick,gap); } else { rlTick=null; } })(); }
  function diceSound(){ noise(.09,.13); setTimeout(function(){noise(.08,.1);},110); setTimeout(function(){noise(.06,.08);},240); }
  function coinSound(){ var a=ac(); if(!a||muted) return; var t=a.currentTime; var o=a.createOscillator(),g=a.createGain();
    o.type='sine'; o.frequency.setValueAtTime(380,t); o.frequency.exponentialRampToValueAtTime(950,t+.5);
    g.gain.setValueAtTime(.05,t); g.gain.exponentialRampToValueAtTime(.0001,t+.5); o.connect(g);g.connect(a.destination); o.start(t);o.stop(t+.55); }
  function ding(){ var a=ac(); if(!a) return; tone(880,.15,'sine',.08); tone(1320,.25,'sine',.05,a.currentTime+.07); }
  function win(){ var a=ac(); if(!a) return; var b=a.currentTime; [523,659,784,1047].forEach(function(f,i){ tone(f,.3,'triangle',.06,b+i*.1); }); }
  var muteBtn=document.getElementById('mute'); muteBtn.textContent=muted?'🔇':'🔊';
  muteBtn.addEventListener('click', function(){ muted=!muted; ls_set('kimeru_mute',muted?'1':'0'); muteBtn.textContent=muted?'🔇':'🔊'; if(!muted) ac(); });

  /* ---- tabs ---- */
  var tabs=document.querySelectorAll('.tab'), panels=document.querySelectorAll('.panel');
  tabs.forEach(function(t){ t.addEventListener('click', function(){
    if(rlSpinning){ finalizeSpin(true); }
    tabs.forEach(function(x){x.setAttribute('aria-selected','false');}); t.setAttribute('aria-selected','true');
    panels.forEach(function(p){ p.classList.toggle('active', p.id===t.dataset.tab); }); ac();
  });});

  /* ===== ROULETTE ===== */
  var rlItems=document.getElementById('rl-items'), rlWheel=document.getElementById('rl-wheel'),
      rlSpin=document.getElementById('rl-spin'), rlResult=document.getElementById('rl-result');
  rlItems.value=ls_get('kimeru_rl_v2','焼肉\n寿司\nラーメン\nカレー');
  rlItems.addEventListener('input', function(){ ls_set('kimeru_rl_v2',rlItems.value); drawWheel(); });
  var rlRot=0, rlSpinning=false, rlWin=0, rlEnd=null;
  function rlGet(){ return lines(rlItems.value).slice(0,MAX_RL); }
  function polar(cx,cy,r,deg){ var a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
  function drawWheel(){
    var items=rlGet(),n=items.length; rlWheel.innerHTML='';
    if(n<2){ rlWheel.innerHTML='<circle cx="100" cy="100" r="96" fill="#f3ecdc"/><text x="100" y="104" text-anchor="middle" font-size="11" fill="#7A6F63">候補を2つ以上入れてください</text>'; return; }
    var seg=360/n;
    for(var i=0;i<n;i++){
      var a0=i*seg,a1=(i+1)*seg,mid=(i+.5)*seg,p0=polar(100,100,96,a0),p1=polar(100,100,96,a1),large=(a1-a0)>180?1:0;
      var path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M100,100 L'+p0[0]+','+p0[1]+' A96,96 0 '+large+' 1 '+p1[0]+','+p1[1]+' Z');
      path.setAttribute('fill',COLORS[i%COLORS.length]); path.setAttribute('stroke','#fff'); path.setAttribute('stroke-width','1.5'); rlWheel.appendChild(path);
      var lp=polar(100,100,62,mid),tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x',lp[0]); tx.setAttribute('y',lp[1]); tx.setAttribute('fill','#fff'); tx.setAttribute('font-size',n>8?'9':'12');
      tx.setAttribute('font-weight','800'); tx.setAttribute('text-anchor','middle'); tx.setAttribute('dominant-baseline','central');
      var rot=mid; if(mid>90&&mid<270) rot=mid+180; tx.setAttribute('transform','rotate('+rot+' '+lp[0]+' '+lp[1]+')');
      var lab=items[i]; if(lab.length>7) lab=lab.slice(0,6)+'…'; tx.textContent=lab; rlWheel.appendChild(tx);
    }
    var rim=document.createElementNS('http://www.w3.org/2000/svg','circle');
    rim.setAttribute('cx','100');rim.setAttribute('cy','100');rim.setAttribute('r','97');rim.setAttribute('fill','none');
    rim.setAttribute('stroke','#caa84a');rim.setAttribute('stroke-width','4'); rlWheel.appendChild(rim);
  }
  function finalizeSpin(silent){ if(!rlSpinning) return; rlSpinning=false; stopSpinSound(); if(rlEnd){ clearTimeout(rlEnd); rlEnd=null; } if(!silent) win();
    rlResult.innerHTML='<div class="label">けっか</div><div class="big">'+esc(rlGet()[rlWin]||'')+'</div>'; }
  rlSpin.addEventListener('click', function(){
    var items=rlGet(),n=items.length; if(n<2||rlSpinning) return; rlSpinning=true; rlResult.innerHTML=''; ac();
    var seg=360/n,i=Math.floor(Math.random()*n),tc=(i+.5)*seg,dm=(360-tc)%360,cm=((rlRot%360)+360)%360,delta=dm-cm; if(delta<0)delta+=360;
    rlRot+=360*5+delta; rlWin=i; rlWheel.style.transform='rotate('+rlRot+'deg)'; spinSound(4.0);
    rlEnd=setTimeout(function(){ finalizeSpin(false); }, 4500);
  });
  rlWheel.addEventListener('transitionend', function(){ finalizeSpin(false); });
  drawWheel();

  /* ===== AMIDA ===== */
  var amTop=document.getElementById('am-top'), amBottom=document.getElementById('am-bottom'),
      amMake=document.getElementById('am-make'), amStage=document.getElementById('am-stage'),
      amSvg=document.getElementById('am-svg'), amTops=document.getElementById('am-tops'), amResult=document.getElementById('am-result');
  amTop.value=ls_get('kimeru_amt_v2','①\n②'); amBottom.value=ls_get('kimeru_amb_v2','あたり\nはずれ');
  amTop.addEventListener('input',function(){ls_set('kimeru_amt_v2',amTop.value);});
  amBottom.addEventListener('input',function(){ls_set('kimeru_amb_v2',amBottom.value);});
  var amData=null;
  function buildAmida(){
    var tops=lines(amTop.value), bots=lines(amBottom.value), n=Math.min(tops.length,bots.length,MAX_AM);
    if(n<2){ amResult.innerHTML='<div class="big" style="font-size:1.1rem">参加者と結果を2つ以上入れてください</div>'; amStage.style.display='block'; amSvg.innerHTML=''; amTops.innerHTML=''; return; }
    tops=tops.slice(0,n); bots=bots.slice(0,n); var levels=Math.max(6,n*2), rungs=[];
    for(var l=0;l<levels;l++){ var used=false; for(var c=0;c<n-1;c++){ if(used){used=false;continue;} if(Math.random()<.45){rungs.push({l:l,c:c});used=true;} } }
    amData={tops:tops,bots:bots,n:n,levels:levels,rungs:rungs}; drawAmida(); renderTops(); amStage.style.display='block'; amResult.innerHTML='';
  }
  function rungAt(l,c){ return amData.rungs.some(function(r){return r.l===l&&r.c===c;}); }
  function trace(start){ var pts=[],n=amData.n,levels=amData.levels,x=function(c){return 30+c*(260/(n-1));},yTop=24,yBot=232,step=(yBot-yTop)/(levels+1),pos=start; pts.push([x(pos),yTop]);
    for(var l=0;l<levels;l++){ var y=yTop+(l+1)*step;
      if(rungAt(l,pos)){ pts.push([x(pos),y]); pos++; pts.push([x(pos),y]); }
      else if(pos>0&&rungAt(l,pos-1)){ pts.push([x(pos),y]); pos--; pts.push([x(pos),y]); } }
    pts.push([x(pos),yBot]); return {points:pts,end:pos}; }
  function drawAmida(hl){ var n=amData.n,levels=amData.levels,x=function(c){return 30+c*(260/(n-1));},yTop=24,yBot=232,step=(yBot-yTop)/(levels+1),s='';
    for(var c=0;c<n;c++){ s+='<line x1="'+x(c)+'" y1="'+yTop+'" x2="'+x(c)+'" y2="'+yBot+'" stroke="#cdbfa6" stroke-width="3"/>'; }
    amData.rungs.forEach(function(r){ var y=yTop+(r.l+1)*step; s+='<line x1="'+x(r.c)+'" y1="'+y+'" x2="'+x(r.c+1)+'" y2="'+y+'" stroke="#cdbfa6" stroke-width="3"/>'; });
    if(hl!=null){ var t=trace(hl),d='M'+t.points[0][0]+','+t.points[0][1]; for(var i=1;i<t.points.length;i++){ d+=' L'+t.points[i][0]+','+t.points[i][1]; }
      s+='<path d="'+d+'" fill="none" stroke="#E0492F" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>'; }
    for(var c2=0;c2<n;c2++){ s+='<text x="'+x(c2)+'" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#241E18">'+esc(amData.bots[c2])+'</text>'; }
    amSvg.innerHTML=s; }
  function renderTops(){ amTops.innerHTML=''; amData.tops.forEach(function(name,idx){ var b=document.createElement('button'); b.textContent=name;
      b.addEventListener('click', function(){ var t=trace(idx); drawAmida(idx); ding();
        amResult.innerHTML='<div class="label">'+esc(name)+' の結果</div><div class="big">'+esc(amData.bots[t.end])+'</div>'; }); amTops.appendChild(b); }); }
  amMake.addEventListener('click', function(){ buildAmida(); ac(); });
  document.getElementById('am-reset').addEventListener('click', buildAmida);
  document.getElementById('am-all').addEventListener('click', function(){ if(!amData)return; drawAmida(); var out='';
    for(var i=0;i<amData.n;i++){ var t=trace(i); out+=esc(amData.tops[i])+' → '+esc(amData.bots[t.end])+'<br>'; }
    amResult.innerHTML='<div class="label">全員の結果</div><div style="font-size:1.05rem;line-height:1.7;color:var(--ink)">'+out+'</div>'; });

  /* ===== GROUP ===== */
  var gpNames=document.getElementById('gp-names'), gpMode=document.getElementById('gp-mode'), gpNum=document.getElementById('gp-num'), gpOut=document.getElementById('gp-out');
  gpNames.value=ls_get('kimeru_gp_v2', nums(6)); gpNames.addEventListener('input',function(){ls_set('kimeru_gp_v2',gpNames.value);});
  document.getElementById('gp-make').addEventListener('click', function(){
    var names=shuffle(lines(gpNames.value).slice(0,MAX_GP)), num=Math.max(1,parseInt(gpNum.value,10)||1);
    if(names.length<2){ gpOut.innerHTML='<div class="small">メンバーを2人以上入れてください</div>'; return; }
    var groups;
    if(gpMode.value==='groups'){ var g=Math.min(num,names.length); groups=[]; for(var i=0;i<g;i++)groups.push([]); names.forEach(function(nm,i){groups[i%g].push(nm);}); }
    else { var size=Math.max(1,num); groups=[]; for(var j=0;j<names.length;j+=size){ groups.push(names.slice(j,j+size)); } }
    var html=''; groups.forEach(function(grp,i){ html+='<div class="group"><h4>グループ '+(i+1)+'（'+grp.length+'人）</h4><ul>'+grp.map(function(nm){return '<li>'+esc(nm)+'</li>';}).join('')+'</ul></div>'; });
    gpOut.innerHTML=html; ding();
  });

  /* ===== DICE ===== */
  var dcCount=document.getElementById('dc-count'), dcFaces=document.getElementById('dc-faces'), dcArea=document.getElementById('dc-area'),
      dcRoll=document.getElementById('dc-roll'), dcResult=document.getElementById('dc-result');
  var PIPS={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  function dieEl(v,faces){ var d=document.createElement('div'); if(faces===6){ d.className='die'; var c=''; for(var i=0;i<9;i++){ c+= PIPS[v].indexOf(i)>=0?'<span class="pip"></span>':'<span></span>'; } d.innerHTML=c; } else { d.className='die num'; d.textContent=v; } return d; }
  function renderDice(vals,faces,rolling){ dcArea.innerHTML=''; vals.forEach(function(v){ var d=dieEl(v,faces); if(rolling)d.classList.add('rolling'); dcArea.appendChild(d); }); }
  function rollDice(){ var n=clampEl(dcCount,1,MAX_DICE,1), faces=parseInt(dcFaces.value,10)||6; dcResult.innerHTML=''; ac(); diceSound(); var ticks=0;
    var iv=setInterval(function(){ var tmp=[]; for(var i=0;i<n;i++)tmp.push(1+Math.floor(Math.random()*faces)); renderDice(tmp,faces,true);
      if(++ticks>8){ clearInterval(iv); var vals=[]; for(var j=0;j<n;j++)vals.push(1+Math.floor(Math.random()*faces)); renderDice(vals,faces,false);
        var sum=vals.reduce(function(a,b){return a+b;},0); ding(); dcResult.innerHTML='<div class="label">合計（'+faces+'面 × '+n+'個）</div><div class="big">'+sum+'</div>'; } },70); }
  dcRoll.addEventListener('click', rollDice);
  dcFaces.addEventListener('change', function(){ var n=clampEl(dcCount,1,MAX_DICE,1),f=parseInt(dcFaces.value,10),init=[]; for(var i=0;i<n;i++)init.push(1); renderDice(init,f,false); });
  renderDice([1],6,false);

  /* ===== COIN (image) ===== */
  var cniCount=document.getElementById('cni-count'), cniArea=document.getElementById('cni-area'),
      cniFlip=document.getElementById('cni-flip'), cniResult=document.getElementById('cni-result');
  function imgEl(src){ var w=document.createElement('div'); w.className='coin-img'; var im=document.createElement('img'); im.src=src; im.alt='coin'; w.appendChild(im); return w; }
  function cniRender(){ var n=readCount(cniCount); cniArea.innerHTML=''; for(var i=0;i<n;i++){ var d=Math.floor(Math.random()*COIN_IMGS.length); cniArea.appendChild(imgEl(COIN_IMGS[d].h)); } }
  cniCount.addEventListener('input', cniRender);
  cniFlip.addEventListener('click', function(){ var n=readCount(cniCount); cniCount.value=n; cniRender(); var coins=cniArea.children; cniResult.innerHTML=''; ac(); coinSound();
    var res=[]; for(var i=0;i<n;i++){ var d=Math.floor(Math.random()*COIN_IMGS.length), head=Math.random()<.5; res.push({d:d,head:head}); }
    for(var j=0;j<coins.length;j++){ coins[j].classList.remove('flip'); void coins[j].offsetWidth; coins[j].classList.add('flip'); }
    setTimeout(function(){ var h=0,t=0; for(var k=0;k<coins.length;k++){ var r=res[k]; coins[k].firstChild.src=COIN_IMGS[r.d][r.head?'h':'t']; if(r.head)h++; else t++; } ding();
      if(n===1){ cniResult.innerHTML='<div class="label">けっか</div><div class="big">'+(res[0].head?'表（おもて）':'裏（うら）')+'</div>'; }
      else { cniResult.innerHTML='<div class="label">けっか</div><div class="big" style="font-size:1.5rem">表 '+h+'枚 ・ 裏 '+t+'枚</div>'; } },1000);
  });
  cniRender();

  /* ===== COIN (text) ===== */
  var cnHead=document.getElementById('cn-head'), cnTail=document.getElementById('cn-tail'), cnCount=document.getElementById('cn-count'),
      cnArea=document.getElementById('cn-area'), cnFlip=document.getElementById('cn-flip'), cnResult=document.getElementById('cn-result');
  cnHead.value=ls_get('kimeru_cnh_v2','表'); cnTail.value=ls_get('kimeru_cnt_v2','裏');
  cnHead.addEventListener('input',function(){ls_set('kimeru_cnh_v2',cnHead.value); cnRender();});
  cnTail.addEventListener('input',function(){ls_set('kimeru_cnt_v2',cnTail.value); cnRender();});
  cnCount.addEventListener('input', cnRender);
  var HS=['radial-gradient(circle at 35% 30%, #f6c451, #E8A93A)','radial-gradient(circle at 35% 30%, #ffd27a, #d98e2b)','radial-gradient(circle at 35% 30%, #f4b8a0, #d9772e)','radial-gradient(circle at 35% 30%, #f6d365, #c9a227)'];
  var TS=['radial-gradient(circle at 35% 30%, #9fd1c7, #2C7A6B)','radial-gradient(circle at 35% 30%, #a7c4e8, #4C6FBF)','radial-gradient(circle at 35% 30%, #c8b0dd, #8E6BB8)','radial-gradient(circle at 35% 30%, #a7d6a0, #5b9e4e)'];
  function hLab(){ return cnHead.value.trim()||'表'; } function tLab(){ return cnTail.value.trim()||'裏'; }
  function cnRender(){ var n=readCount(cnCount); cnArea.innerHTML=''; for(var i=0;i<n;i++){ var c=document.createElement('div'); c.className='coin'; c.style.background=HS[0]; c.textContent=hLab(); cnArea.appendChild(c); } }
  cnFlip.addEventListener('click', function(){ var n=readCount(cnCount); cnCount.value=n; cnRender(); var coins=cnArea.children; cnResult.innerHTML=''; ac(); coinSound();
    var res=[]; for(var i=0;i<n;i++){ var head=Math.random()<.5; res.push({head:head,skin:(head?HS:TS)[Math.floor(Math.random()*4)]}); }
    for(var j=0;j<coins.length;j++){ coins[j].classList.remove('flip'); void coins[j].offsetWidth; coins[j].classList.add('flip'); }
    setTimeout(function(){ var h=0,t=0; for(var k=0;k<coins.length;k++){ var r=res[k]; coins[k].style.background=r.skin; coins[k].textContent=r.head?hLab():tLab(); if(r.head)h++; else t++; } ding();
      if(n===1){ cnResult.innerHTML='<div class="label">けっか</div><div class="big">'+esc(res[0].head?hLab():tLab())+'</div>'; }
      else { cnResult.innerHTML='<div class="label">けっか</div><div class="big" style="font-size:1.5rem">'+esc(hLab())+' '+h+'枚 ・ '+esc(tLab())+' '+t+'枚</div>'; } },1000);
  });
  cnRender();

  /* ===== KUJI ===== */
  var kjTotal=document.getElementById('kj-total'), kjHit=document.getElementById('kj-hit'), kjDraw=document.getElementById('kj-draw'),
      kjResult=document.getElementById('kj-result'), kjStatus=document.getElementById('kj-status');
  var kjPool=null;
  function kjReset(){ var total=clampEl(kjTotal,1,MAX_KUJI,5), hit=clampEl(kjHit,0,total,1); kjPool=[]; for(var i=0;i<total;i++) kjPool.push(i<hit); shuffle(kjPool);
    kjResult.innerHTML=''; kjStatus.textContent='のこり '+kjPool.length+'本（あたり '+hit+'本）'; }
  kjDraw.addEventListener('click', function(){ ac(); if(!kjPool||kjPool.length===0){ kjReset(); }
    if(kjPool.length===0){ kjResult.innerHTML='<div class="big" style="font-size:1.2rem">くじがありません</div>'; return; }
    var hit=kjPool.pop(); var rem=kjPool.length, remHit=kjPool.filter(function(x){return x;}).length;
    if(hit){ win(); kjResult.innerHTML='<div class="label">🎉</div><div class="big">あたり！</div>'; } else { tone(220,.25,'sine',.06); kjResult.innerHTML='<div class="label">…</div><div class="big" style="color:#7A6F63">はずれ</div>'; }
    kjStatus.textContent='のこり '+rem+'本（あたり '+remHit+'本）'; if(rem===0) kjStatus.textContent+=' ／ すべて引き終わりました'; });
  document.getElementById('kj-reset').addEventListener('click', function(){ kjTotal.value='5'; kjHit.value='1'; kjReset(); });
  kjReset();

  /* ===== NUMBER ===== */
  var nmMin=document.getElementById('nm-min'), nmMax=document.getElementById('nm-max'), nmCount=document.getElementById('nm-count'),
      nmUniq=document.getElementById('nm-uniq'), nmResult=document.getElementById('nm-result');
  document.getElementById('nm-go').addEventListener('click', function(){ ac();
    var mn=parseInt(nmMin.value,10), mx=parseInt(nmMax.value,10); if(isNaN(mn))mn=1; if(isNaN(mx))mx=100; if(mn>mx){ var tmp=mn;mn=mx;mx=tmp; nmMin.value=mn; nmMax.value=mx; }
    var range=mx-mn+1, cnt=clampEl(nmCount,1,MAX_NUM,1), uniq=nmUniq.checked; if(uniq&&cnt>range){ cnt=range; nmCount.value=cnt; }
    var picks=[];
    if(uniq){ var pool=[]; for(var i=mn;i<=mx;i++)pool.push(i); shuffle(pool); picks=pool.slice(0,cnt); }
    else { for(var j=0;j<cnt;j++) picks.push(mn+Math.floor(Math.random()*range)); }
    picks.sort(function(a,b){return a-b;}); win();
    nmResult.innerHTML='<div class="label">えらばれた数字</div><div class="big">'+picks.join('  ')+'</div>';
  });
  /* ===== RESET BUTTONS ===== */
  document.getElementById('rl-reset').addEventListener('click', function(){ rlItems.value='焼肉\n寿司\nラーメン\nカレー'; ls_set('kimeru_rl_v2',rlItems.value); rlResult.innerHTML=''; drawWheel(); });
  document.getElementById('am-default').addEventListener('click', function(){ amTop.value='①\n②'; amBottom.value='あたり\nはずれ'; ls_set('kimeru_amt_v2',amTop.value); ls_set('kimeru_amb_v2',amBottom.value); amData=null; amStage.style.display='none'; amResult.innerHTML=''; });
  document.getElementById('gp-reset').addEventListener('click', function(){ gpNames.value=nums(6); ls_set('kimeru_gp_v2',gpNames.value); gpNum.value='2'; gpMode.value='groups'; gpOut.innerHTML=''; });
  document.getElementById('dc-reset').addEventListener('click', function(){ dcCount.value='1'; dcFaces.value='6'; dcResult.innerHTML=''; renderDice([1],6,false); });
  document.getElementById('cni-reset').addEventListener('click', function(){ cniCount.value='1'; cniResult.innerHTML=''; cniRender(); });
  document.getElementById('cn-reset').addEventListener('click', function(){ cnHead.value='表'; cnTail.value='裏'; cnCount.value='1'; ls_set('kimeru_cnh_v2','表'); ls_set('kimeru_cnt_v2','裏'); cnResult.innerHTML=''; cnRender(); });
  document.getElementById('nm-reset').addEventListener('click', function(){ nmMin.value='1'; nmMax.value='100'; nmCount.value='1'; nmUniq.checked=true; nmResult.innerHTML=''; });
  cniCount.addEventListener('blur', function(){ cniCount.value=readCount(cniCount); cniRender(); });
  cnCount.addEventListener('blur', function(){ cnCount.value=readCount(cnCount); cnRender(); });
  document.querySelectorAll('.num').forEach(function(el){ el.addEventListener('focus', function(){ setTimeout(function(){ try{el.select();}catch(e){} },0); }); });
})();
</script>
</body>
